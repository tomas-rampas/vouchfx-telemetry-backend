# Keeps GitHub Actions references in .github/workflows/ maintained.
# The secret-touching workflows pin every action to a full commit SHA for
# supply-chain integrity; without this ecosystem entry those pins would
# silently rot. Dependabot updates SHA pins and their trailing version
# comments together.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
