# .github/workflows/pages.yml — vouchfx-telemetry-backend project site (GitHub Pages)
#
# Publishes the static landing page in `site/` PLUS the repository's markdown
# (the opt-in overview, privacy policy, wire contract, architecture, operations
# runbook, self-hosting guide, and the project documents), rendered to styled
# HTML by `scripts/build_site.py`. The markdown files stay the single source
# of truth; this regenerates their HTML on every run, so the published docs
# never drift.
#
# One-time setup (repository owner): Settings → Pages → Build and deployment →
# Source: "GitHub Actions".

name: Pages

on:
  push:
    branches: [main]
    # SUPERSET INVARIANT: this list must cover every source path rendered by
    # scripts/build_site.py's DOCS list (see the invariant comment there) —
    # docs/** and the four root project documents already do. If a new
    # top-level doc is ever added outside these globs, add it here too, or a
    # push that changes it will not trigger a rebuild.
    paths:
      - 'site/**'
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'scripts/build_site.py'
      - '.github/workflows/pages.yml'
  # Manual runs (any branch) for previewing before a change reaches main.
  # Ecosystem fan-out: a sibling repo's docs merge triggers a rebuild here so
  # build-time facts ({{fact:...}} tokens) re-resolve against the live APIs.
  repository_dispatch:
    types: [ecosystem-docs-updated]
  # Weekly belt-and-braces rebuild (staggered per repo) so facts stay fresh
  # even if the dispatch fan-out is unavailable (e.g. an expired PAT).
  schedule:
    - cron: '37 4 * * 4'
  workflow_dispatch:

# Allow the deploy job to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install markdown==3.10.2 pygments==2.20.0 \
            "vouchfx-site-tools @ git+https://github.com/tomas-rampas/vouchfx.git@4005be21e5b4d75af3d1f3852c066057149eeb1e#subdirectory=scripts/site-tools"  # pinned engine SHA — bump deliberately when site-tools changes

      - name: Build site (landing page + rendered docs)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_site.py _site

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      # The Pages service intermittently rejects a freshly created deployment
      # with "Deployment failed, try again later" (observed on sibling sites;
      # a retry minutes later succeeds). Absorb that flake with one in-job
      # retry instead of requiring a human re-run.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true

      - name: Wait before retrying a rejected deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (retry)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # Fan-out: after a successful docs deploy caused by a PUSH, ask the sibling
  # repos to rebuild their sites so their build-time facts refresh. One-hop
  # guard: dispatch-, cron- and manually-triggered runs never re-notify, so a
  # cycle is impossible. Requires the ECOSYSTEM_DISPATCH_TOKEN secret (a
  # fine-grained PAT with Contents read/write on the four vouchfx repos);
  # loud-skips when absent — the weekly cron then covers freshness.
  notify:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch ecosystem-docs-updated to sibling repos
        env:
          TOKEN: ${{ secrets.ECOSYSTEM_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::ECOSYSTEM_DISPATCH_TOKEN is not set - sibling sites will refresh on their weekly crons instead."
            echo "ECOSYSTEM_DISPATCH_TOKEN missing; fan-out skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          for repo in vouchfx vouchfx-providers vouchfx-samples; do
            if curl -sfS -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY_OWNER/$repo/dispatches" \
              -d '{"event_type":"ecosystem-docs-updated"}'; then
              echo "notified $repo" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::failed to notify $repo"
              echo "FAILED to notify $repo" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
