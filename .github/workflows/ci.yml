# ────────────────────────────────────────────────────────────────────────────────
# ci.yml — Continuous integration: restore, build, format-check, unit tests.
#
# Triggers:
#   • push to main
#   • pull_request targeting main
#
# This job does NOT start Docker.  Testcontainers-based integration tests live in
# integration.yml and run on a separate schedule.
#
# coverage-badge (main pushes only, non-blocking) turns the unit-test Cobertura
# coverage into a shields.io endpoint JSON on the orphan `badges` branch, which
# feeds the README's self-hosted coverage badge — no coverage service.
# The badge is labelled "unit coverage" and deliberately scoped to the
# unit-testable surface: the Persistence and Background namespaces are
# excluded because they are DB-bound by design and covered by the separate
# Testcontainers integration suite (integration.yml), which does not feed
# this badge. An unscoped figure (~46%) misread as poor testing when the
# uncovered bulk was integration-covered code.
#
# SDK version is read from global.json (8.0.400, rollForward: latestFeature).
# NuGet packages are cached keyed on all .csproj files + global.json so a
# dependency change busts the cache while a source-only change reuses it.
# ────────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, format-check, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET (reads version from global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version-file: global.json

      # Cache NuGet packages.  The key is based on the OS, all .csproj files,
      # and global.json so a new dependency or SDK pin busts the cache.
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Vouchfx.Telemetry.Backend.sln

      # Build the whole solution with warnings-as-errors enforced by
      # Directory.Build.props (<TreatWarningsAsErrors>true</TreatWarningsAsErrors>).
      # The -warnaserror flag is redundant but makes the intent explicit in CI.
      - name: Build (Release, warnings as errors)
        run: dotnet build Vouchfx.Telemetry.Backend.sln -c Release --no-restore -warnaserror

      # Verify formatting matches .editorconfig.  --verify-no-changes exits 1
      # if any file needs reformatting, blocking the PR.
      - name: Format check
        run: dotnet format --verify-no-changes Vouchfx.Telemetry.Backend.sln

      # Run unit tests only (no Docker required).
      # --collect:"XPlat Code Coverage" writes Cobertura XML via
      # coverlet.collector (referenced by the test project); the
      # coverage-badge job below turns it into the README's coverage badge.
      - name: Unit tests
        run: >
          dotnet test
          tests/Vouchfx.Telemetry.Backend.UnitTests
          -c Release
          --no-build
          --logger "trx;LogFileName=unit-results.trx"
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-test-results
          path: '**/*.trx'
          retention-days: 7

      - name: Upload coverage artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: TestResults/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # container-build — verify the Docker image can be produced end-to-end.
  #
  # This job gates the class of defect that unit / integration tests cannot
  # catch: a missing build-context file, a broken COPY instruction, or a CSC
  # EmbeddedResource path that doesn't resolve inside the image.  No image is
  # pushed; the build is a correctness check only.
  #
  # `dotnet publish` runs inside the SDK layer (Stage 1), so the job takes
  # roughly the same time as the CI restore + build step above — the NuGet
  # packages are fetched by the Docker layer cache on the runner, not from
  # the host cache, keeping the jobs fully independent.
  # ────────────────────────────────────────────────────────────────────────────
  container-build:
    name: Container image build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Build the image using the repo root as build context (same as
      # `az acr build --file Dockerfile .` in deploy.yml).  No registry push.
      # A non-zero exit from `docker build` fails the job and blocks the PR.
      - name: Build Docker image
        run: docker build -f Dockerfile -t vfxtel:ci-check .

  # ────────────────────────────────────────────────────────────────────────────
  # coverage-badge — self-hosted coverage badge, cosmetic, NON-BLOCKING.
  #
  # Turns the Cobertura XML produced by build-and-test into a shields.io
  # endpoint JSON + SVG via ReportGenerator + jq and force-pushes them to the
  # orphan `badges` branch (single commit — no history growth).  The README
  # renders the JSON through img.shields.io/endpoint, so the coverage number
  # stays entirely self-hosted (no coverage service, no new credentials).
  #
  # Runs only for pushes to main — PR runs must never move the published
  # badge.  A red build-and-test skips this job via `needs`, retaining the
  # last good badge.  contents: write is scoped to this job only (it runs no
  # build/test code, it only consumes the artifact).
  # ────────────────────────────────────────────────────────────────────────────
  coverage-badge:
    name: Coverage badge (main only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true            # cosmetic — must never redden CI
    permissions:
      contents: write                  # push to the `badges` branch (this job only)

    steps:
      - name: Download coverage artefacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage
          path: TestResults

      # No checkout in this job, so pin the SDK channel directly instead of
      # reading global.json; ReportGenerator only needs a .NET 8 runtime.
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"

      # The global-tool shim lands under ~/.dotnet/tools, which is NOT
      # guaranteed to be on PATH for subsequent steps — append it to
      # $GITHUB_PATH so the next steps can invoke `reportgenerator` bare.
      - name: Install ReportGenerator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.10
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # JsonSummary yields Summary.json (machine-readable percentages); Badges
      # yields badge_linecoverage.svg, kept alongside the endpoint JSON as a
      # zero-third-party fallback.  (Verified on 5.5.10: Badges does NOT emit
      # a shields endpoint JSON — only pre-coloured SVGs — hence the compose
      # step below.)
      # classfilters scope the badge to the unit-testable surface: Persistence
      # (NpgsqlTelemetryRepository, DbBootstrapper, ...) and Background
      # (PartitionManager, RetentionHostedService, ...) are DB-bound by design
      # and covered by the Testcontainers integration suite instead — see the
      # header comment.
      - name: Generate coverage summary + badge SVG
        run: >
          reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:badge-out
          -reporttypes:"Badges;JsonSummary"
          -assemblyfilters:"+Vouchfx.*;-*.Tests;-*.UnitTests;-*.TestSupport"
          -classfilters:"-Vouchfx.Telemetry.Backend.Persistence.*;-Vouchfx.Telemetry.Backend.Background.*"

      # Compose the shields.io endpoint JSON
      # (https://shields.io/badges/endpoint-badge) the README renders via
      # img.shields.io/endpoint.  Colour thresholds: red below 60 %, yellow
      # to 75 %, green to 90 %, brightgreen above.
      - name: Compose shields endpoint JSON
        run: |
          pct=$(jq -r '.summary.linecoverage' badge-out/Summary.json)
          # Fail loudly on a non-numeric percentage (e.g. null when the filter
          # matched nothing) — better no badge update than a "null%" badge.
          [[ "$pct" =~ ^[0-9]+(\.[0-9]+)?$ ]] || { echo "unexpected linecoverage: '$pct'" >&2; exit 1; }
          jq -n --argjson pct "$pct" '{
            schemaVersion: 1,
            label: "unit coverage",
            message: "\($pct)%",
            color: (if $pct >= 90 then "brightgreen"
                    elif $pct >= 75 then "green"
                    elif $pct >= 60 then "yellow"
                    else "red" end)
          }' > badge-out/coverage-endpoint.json
          cat badge-out/coverage-endpoint.json

      # Orphan single-commit publish: git init + force-push replaces the branch
      # wholesale each run.  `badges` is not a CI trigger branch, so this push
      # cannot re-trigger CI.  The token reaches git via env, never
      # interpolated into the script text.
      - name: Publish to badges branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd badge-out
          git init -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-endpoint.json badge_linecoverage.svg
          git commit -m "coverage badge for ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
